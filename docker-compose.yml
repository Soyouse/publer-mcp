# publer-mcp — service conteneurisé (isolation deps/malware vs hôte ; parité discord-mcp).
# ⚠️ network_mode host : le bridge Docker par défaut de CE VPS n'a PAS d'egress (mesuré : fetch échoue
#    sur bridge, 200 en --network host). Le runtime DOIT joindre app.publer.com → réseau hôte.
#    Isolation FS/deps/process PRÉSERVÉE (une dép compromise reste dans le conteneur) ; seul le net est partagé.
# ⚠️ Avec network_mode host : pas de mapping `ports`, l'app bind directement PUBLER_MCP_HTTP_HOST:PORT
#    sur l'hôte (IP Tailscale du tailnet, tailnet only — JAMAIS 0.0.0.0), défini dans service.env.
# ⚠️ build.network host : npm ci a besoin du réseau (même raison que le runtime).
# ⚠️ Secrets montés read-only, JAMAIS dans l'image. service.env (chmod 600) = token/port/allowed-hosts.
services:
  publer-mcp:
    build:
      context: .
      network: host
    image: publer-mcp:latest
    container_name: publer-mcp
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./service.env
    volumes:
      - ./.secrets.json:/app/.secrets.json:ro
